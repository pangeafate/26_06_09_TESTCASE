name: Local Gateway Backstop

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  gateway:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          # Full history: the governance validators resolve the active sprint and the
          # doc-freshness diff base from git log (commit subjects + the plan-introducing
          # commit's parent). A shallow (depth-1) checkout breaks both — it makes the
          # gateway diff every meta-doc against the empty tree and mis-resolve the active
          # sprint — so CI diverges from the local gateway. Fetch everything.
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Python dependencies if declared
        run: |
          if [ -f requirements.txt ]; then
            python -m pip install --upgrade pip
            python -m pip install -r requirements.txt
          elif [ -f pyproject.toml ]; then
            # This project declares deps in pyproject ([project] + the `dev` extra:
            # pytest/mypy). Without this the gateway's python-tests step dies on
            # `No module named pytest`. Editable install so the gateway runs against the tree.
            python -m pip install --upgrade pip
            python -m pip install -e ".[dev]"
          fi

      - name: Install Node dependencies if declared
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          elif [ -f package.json ]; then
            npm install
          fi

      - name: Run local development gateway
        run: |
          if [ -f scripts/dev-gateway.py ]; then
            python3 scripts/dev-gateway.py . --stage ci
          elif [ -f validators/run_all.py ]; then
            python3 validators/run_all.py .
          else
            echo "No local gateway or validators found."
            exit 1
          fi
