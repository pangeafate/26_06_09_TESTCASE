name: Local Gateway Backstop

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Callable as a reusable workflow so deploy.yml can gate its deploy job on this
  # gateway (`gateway: uses: ./.github/workflows/dev-rules-ci.yml`). Without this
  # trigger the reusable reference is invalid and the Deploy workflow fails to launch
  # ("workflow file issue", 0s) — which is why CI had never actually deployed.
  workflow_call:

jobs:
  # Unit + non-DB suite via the local dev-gateway. DELIBERATELY DB-free: with no
  # DATABASE_URL the `db` integration tests skip AND the FastAPI app wires the
  # MockQueryEngine (helixpay.api.app.wire_engine gates on DATABASE_URL), which is
  # what the unit REST/MCP transport tests assume. The real-DB serving path runs in
  # the separate `integration` job below. (SP_030)
  gateway:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          # Full history: the doc-freshness/sprint validators resolve the active
          # sprint and diff-base from git history (need HEAD^ and prior commits).
          # A shallow (depth-1) clone makes resolve_diff_base fall back to the
          # empty-tree base, mis-scoping every meta-doc into range → false F-4
          # "bumped backwards" failures. fetch-depth: 0 makes CI match local.
          fetch-depth: 0

      # --- uv path: the project declares deps in pyproject.toml (this repo). uv
      #     creates the venv and installs the project + the `dev` extra (pytest, mypy)
      #     reproducibly from uv.lock. The gateway shells `sys.executable -m pytest`,
      #     so it MUST run under `uv run` (below) for that interpreter to be the venv.
      - name: Set up uv
        if: hashFiles('pyproject.toml') != ''
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync Python dependencies (uv)
        if: hashFiles('pyproject.toml') != ''
        run: uv sync --extra dev

      # --- Fallback path: no pyproject → keep the original setup-python + optional
      #     requirements.txt behavior so this workflow stays a generic backstop.
      - name: Set up Python (fallback)
        if: hashFiles('pyproject.toml') == ''
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Python dependencies if declared (requirements.txt fallback)
        if: hashFiles('pyproject.toml') == '' && hashFiles('requirements.txt') != ''
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Install Node dependencies if declared
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          elif [ -f package.json ]; then
            npm install
          fi

      - name: Run local development gateway
        run: |
          if [ -f pyproject.toml ]; then
            RUN="uv run python"
          else
            RUN="python3"
          fi
          if [ -f scripts/dev-gateway.py ]; then
            $RUN scripts/dev-gateway.py . --stage ci
          elif [ -f validators/run_all.py ]; then
            $RUN validators/run_all.py .
          else
            echo "No local gateway or validators found."
            exit 1
          fi

  # The REAL serving-path gate (SP_030): runs ONLY the `db`-marked tests against a real
  # pgvector, so the MCP dispatch → HelixQueryEngine → PostgresRepository path that the
  # FakeRepository unit suite could only approximate is exercised for real. Scoped to
  # `-m db` so the unit REST/MCP transport tests (which assume the mock engine) do NOT
  # run here with DATABASE_URL set. HELIXPAY_REQUIRE_DB makes an absent/misconfigured DB
  # a loud failure (test/conftest.py) rather than a silent skip of the whole suite.
  integration:
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/postgres
      HELIXPAY_REQUIRE_DB: "1"

    services:
      db:
        image: pgvector/pgvector:pg16
        # POSTGRES_USER is intentionally omitted — the image defaults it to `postgres`,
        # matching the user in DATABASE_URL above.
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - "5432:5432"
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync Python dependencies (uv)
        run: uv sync --extra dev

      - name: Run the db-marked serving-path suite against pgvector
        # -m db selects every db-marked test across the tree: the integration suites,
        # the conformance real-half, and the MCP-tools-e2e file. The pg_repo fixture
        # self-runs apply_schema (CREATE EXTENSION vector + schema), so no separate
        # migrate/seed step is needed.
        run: uv run pytest test -m db -p no:cacheprovider -q
