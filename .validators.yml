# Validator configuration example for the development-rule scaffold.
#
# Shared config file schema:
#   - doc_reality: consumed by validators/validate_doc_reality.py
#   - doc_freshness: consumed by validators/validate_doc_freshness.py
#   - required_files: consumed by validators/validate_structure.py
#   - bootstrap_files: consumed by validators/validate_workspace.py
#   - module_size: consumed by validators/validate_module_size.py
#   - coverage: consumed by validators/validate_tdd.py
# Unknown keys are ignored by consumers.

# Files scanned by validate_workspace.py for size limits and credential leaks.
# Defaults are the AGENT_INSTRUCTIONS/AGENT_IDENTITY stubs (pruned for HelixPay —
# governance lives in CLAUDE.md + AGENTS.md); point the scan at those instead.
bootstrap_files:
  - CLAUDE.md
  - AGENTS.md

# Coverage gate for validate_tdd.py. Artifact-based: produce a Cobertura report
# with `pytest --cov=src --cov-report=xml`, then validate_tdd.py parses it and
# fails when line/branch coverage is below threshold. A missing report is
# advisory unless require_report is true. All keys optional (defaults shown).
coverage:
  line: 80              # minimum line coverage percent (GL-TDD.md)
  branch: 75            # minimum branch coverage percent (GL-TDD.md)
  report: coverage.xml  # path (relative to project root) to the Cobertura report
  require_report: false # true → a missing report is a hard failure, not advisory

# Language-agnostic God-file sensor. Counts raw lines and import-like lines per
# source file. lines > fail_lines is a hard FAIL; lines > warn_lines or
# imports > warn_imports are warnings (exit 0). Built-in vendored/generated dirs
# (.git, .venv, node_modules, dist, build, vendor, __pycache__, …) are always
# skipped. All keys are optional — omit the block to run with built-in defaults.
module_size:
  enabled: true
  # Directories scanned for source files (relative to project root).
  source_roots: [src, scripts, skills]
  # File extensions treated as source (defaults cover most mainstream langs).
  extensions: ['.ts', '.tsx', '.js', '.jsx', '.py', '.go', '.rs', '.java', '.rb', '.php', '.cs', '.cpp', '.swift']
  warn_lines: 800       # WARNING above this — approaching God-file size
  fail_lines: 2000      # FAIL above this — must be split (GL-RDD SRP)
  warn_imports: 25      # WARNING above this — high coupling (advisory)
  # fnmatch globs over the project-root-relative POSIX path; '*' spans '/',
  # so write '*.gen.ts', not '**/*.gen.ts'. Excluded files are never scanned.
  exclude:
    - "*.min.js"
    - "*.generated.*"
    - "*.gen.ts"
  # Grandfathered files: still WARN (debt stays visible) but never FAIL.
  # Add a tracking sprint id in a trailing comment when you list one.
  allow: []
    # - "src/runtime/components.ts"   # SP_NNN: God-file split in progress

doc_freshness:
  enabled: true
  source_roots: [src, scripts, skills]
  meta_docs:
    - PROGRESS.md
    - FEATURE_LIST.md
    - PROJECT_ROADMAP.md
    - ARCHITECTURE.md
    - DATA_SCHEMA.md
    - CODEBASE_STRUCTURE.md
    - USER_STORIES.md
  exempt_paths:
    - validators/test_*.py
    - validators/test_fixtures/**
    - skills/**/test_*.py

doc_reality:
  exclude_dirs:
    - .git
    - .venv
    - node_modules
    - dist
    - build
    - data          # the HelixPay dataset — input content, not authored project docs
    - DEV_RULES      # vendored governance bundle (gitignored); operative copies live at root
    - .claude        # isolated agent worktrees live under .claude/worktrees/ — their docs
                     # reference paths real on their own branch but not yet on main; scanning
                     # them as if they were main's docs is the worktree-pollution failure
                     # DEV_REINFORCE F-6 warns about. Exclude the whole agent-private tree.
    - fanout         # Phase-1 build briefs — planning scaffolding that deliberately references
                     # the build agents' planned deliverables (ingest/pipeline.py, the per-agent
                     # sprint plans, test/golden/) before they merge to main. Same rationale as
                     # the dead_path_exclusions below; the whole dir is future-state planning.
    - research       # external reference material (extraction design notes, GraphRAG citations);
                     # cites example/third-party paths, not authored project reality.
  dead_path_exclusions:
    - test/unit/
    - test/integration/
    - test/fixtures/
    - __pycache__/
    - tasks/
    - .venv/
    # Planned deliverables of the post-gate build agents (HELIXPAY_BUILD_SPEC §5/§6);
    # referenced by the spec / CLAUDE.md / docs before they exist. Bare-dir tokens
    # are exact-matched here; their sub-paths are globbed below.
    - prompts/
    - eval/
    - tests/golden/
    - ingest/
    - query/
    - mcp/
    - api/
    - deploy/
    - helixpay/cli.py
    - db/schema.sql        # spec shorthand for helixpay/db/schema.sql
    - smoke-test/          # bootstrap sample task (TASK_000); not part of HelixPay
    - DEV_RULES/           # vendored governance bundle, gitignored (.gitignore:29) — present on
                           # disk locally but never in a clean checkout/CI, so PROGRESS.md's
                           # `DEV_RULES/DEV_REINFORCE.md` ref is not a dead path. (exclude_dirs
                           # already skips scanning *inside* it; this skips refs *to* it.)
  dead_path_glob_exclusions:
    - "src/*"
    - "test/unit/*"
    - "test/integration/*"
    - "test/fixtures/*"
    - ".github/workflows/*"
    # sub-paths under the planned build-agent dirs (matcher is fnmatch; '*' spans '/')
    - "prompts/*"
    - "eval/*"
    - "tests/golden/*"
    - "ingest/*"
    - "query/*"
    - "mcp/*"
    - "api/*"
    - "deploy/*"
    - "smoke-test/*"
    - "DEV_RULES/*"        # gitignored governance bundle (see dead_path_exclusions above)
  frontmatter_required:
    - PROGRESS.md
  duplication_threshold: 30
