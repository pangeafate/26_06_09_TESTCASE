# HelixPay — nginx location block. Paste INSIDE the existing TLS `server { }`
# block for the subdomain (the one that already terminates HTTPS). Routes all
# traffic, including the streamable-HTTP MCP endpoint at /mcp, to the loopback app.

location / {
    proxy_pass http://127.0.0.1:8000;
    proxy_http_version 1.1;

    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # streamable-HTTP / SSE: disable buffering and allow long-lived responses.
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
}
