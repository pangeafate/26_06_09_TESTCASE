# HelixPay — nginx vhost (the config actually deployed on the droplet).
# Drop at /etc/nginx/sites-available/helixpay, symlink into sites-enabled, then
# `certbot --nginx -d helixpay.serverado.app --redirect` provisions TLS and adds
# the managed `listen 443 ssl` block + the HTTP->HTTPS redirect automatically.
#
# Live: https://helixpay.serverado.app  (MCP at /mcp). Routes to the loopback app.

server {
    listen 80;
    server_name helixpay.serverado.app;

    # MCP streamable-HTTP: serve /mcp (no trailing slash) by internally proxying to
    # /mcp/ so external agents using the published /mcp URL don't hit Starlette's 307
    # mount redirect — that redirect drops the SSE `Accept` header on the follow-up
    # GET (→ 406) and manifests as a client hang. Exact match only; sub-paths fall
    # through to `location /` below. (Applied on the box 2026-06-10; kept in IaC so a
    # certbot/nginx re-provision does not regress it.)
    location = /mcp {
        proxy_pass http://127.0.0.1:8000/mcp/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;

        # WebSocket / upgrade passthrough
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # streamable-HTTP / SSE: disable buffering, allow long-lived responses.
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
