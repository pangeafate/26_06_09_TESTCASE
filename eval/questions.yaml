# HelixPay deep-question set (HELIXPAY_BUILD_SPEC.md §8).
#
# Each question exercises ONE failure mode the naive "chunk→embed→search→LLM"
# pipeline gets wrong: hierarchy resolution, staleness/freshest-wins, contradiction
# surfacing, cross-document synthesis, entity resolution + aliases. eval/run.py runs
# each through QueryEngine.ask() and evaluates its `checks` against the AnswerBundle.
#
# checks vocabulary (CLOSED — test_golden.py asserts no check outside this set):
#   cites_source            >=1 citation carrying a source_uri
#   states_as_of            >=1 citation carrying an as_of date
#   resolves_hierarchy      cites an org-chart source / org reporting line
#   uses_freshest_as_of     the freshest as_of among citations is surfaced/preferred
#   surfaces_contradiction  AnswerBundle.contradictions is non-empty
#   attributes_each_side    contradiction present AND >=2 distinct citation sources
#   cross_document_synthesis  citations span >=2 distinct source_uris
#   cites_multiple_sources    citations span >=2 distinct source_uris
#   entity_resolution       answer is grounded (>=1 citation) on a resolved entity
#   alias_handling          (soft) reported, not gated — hard alias test is in recall
#   no_false_contradiction  AnswerBundle.contradictions is EMPTY (truthful "they agree")
#
# `gates: true` checks decide the /goal verdict; `soft`-listed checks are reported only.

questions:
  - id: q-hierarchy-head-of-eng
    q: "Who does the Head of Engineering report to, as of the latest org chart?"
    checks: [resolves_hierarchy, uses_freshest_as_of, cites_source, states_as_of]
    golden_refs: [org-daniel-reports-arjun]
    expected: >-
      Daniel Tan (VP Engineering) reports to Arjun Kapoor (CTO); Arjun reports to Wei
      Chen (CEO). As of the org chart exported 2026-04-15.
    note: >-
      Tests recursive-CTE hierarchy + freshest as_of. "Head of Engineering" should
      resolve to the VP Engineering (Daniel Tan), not be confused with the CTO.

  - id: q-confluence-timeline
    q: "When is the Confluence platform scheduled to go live (GA)? Do sources agree?"
    checks: [surfaces_contradiction, attributes_each_side, uses_freshest_as_of, cites_source, states_as_of]
    golden_refs: [md-allhands-confluence-june, pdf-boarddeck-confluence-q3]
    contradiction_ref: confluence-ga-timeline
    expected: >-
      Sources DISAGREE. The all-hands (2026-04-15) said end of June (end-Q2); the board
      deck (2026-05-12), weekly review (04-21), board update (04-22) and Daniel Tan's
      interview say end of Q3 / ~Sep 30. Freshest = end-Q3; surface both, attribute each.
    note: THE primary planted contradiction (temporal + public-vs-internal disagreement).

  - id: q-ceo-priorities
    q: "Summarize the CEO's (Wei Chen's) priorities."
    checks: [cross_document_synthesis, cites_multiple_sources, cites_source]
    golden_refs: []
    expected: >-
      Wei has no interview — synthesize from all-hands, board update, exec-huddle chat,
      and the Cosmos email. Priorities: fix Q2 growth-pace (esp. Brasil SMB) without it
      becoming a board problem; re-baseline the Confluence platform; the Codos AI
      engagement (one shared ontology for internal agents); customer health + honest NPS
      framing; a go/no-go on multi-property reporting.
    note: Tests multi-document synthesis with attribution; no single-doc shortcut exists.

  - id: q-dashboards-vs-boarddeck
    q: "Do the dashboards and the board deck disagree on any key Q1 metrics?"
    checks: [cites_multiple_sources, states_as_of, cites_source, no_false_contradiction]
    golden_refs: [html-dashboard-revenue, pdf-results-revenue, html-dashboard-nps]
    expected: >-
      On the HEADLINE Q1 metrics they AGREE: revenue SGD 14.2M, EBITDA −2.1M, aggregate
      NPS 47, net new merchants 412 — identical in dashboard, results PDF and board deck.
      The real disagreements in the dump are the Confluence timeline (not a dashboard
      metric) and the NPS framing (62 SEA-enterprise headline vs 47 aggregate).
    note: >-
      Honest-oracle guard. The system must NOT hallucinate a revenue conflict to satisfy
      the question (the gate fixture's synthetic 13.9M does not exist in raw data).
      no_false_contradiction gates: a metric contradiction here is a FALSE POSITIVE.

  - id: q-revenue-agreement
    q: "What was HelixPay's Q1 2026 revenue, and do the sources agree on it?"
    checks: [cites_source, states_as_of, cites_multiple_sources, no_false_contradiction]
    golden_refs: [pdf-results-revenue, html-dashboard-revenue, md-overview-runway]
    expected: >-
      SGD 14.2M for Q1 2026 (period ending 2026-03-31), −11% vs the 16M plan. All
      sources agree (results PDF, dashboard, board deck, overview, all-hands). There is
      NO revenue contradiction.
    note: >-
      Directly tests the synthetic-fixture trap: a correct system reports a single,
      well-cited figure and does NOT surface a fabricated dashboard-vs-board-deck split.

  - id: q-customers-and-owners
    q: "List the customers mentioned and who owns each relationship."
    checks: [entity_resolution, alias_handling, cites_source, cites_multiple_sources]
    golden_refs: [email-cosmos-owner, email-acai-owner]
    expected: >-
      Customers incl. Cosmos Hotels (Marcus Lee, churned), Açaí Express SP (Maria
      Santos), Lazada SG midmarket, Banco Verde, Sundara Hotels (Marcus Lee, at-risk),
      Pacific QSR Holdings, Northwind, Boteco do Pedro (Larissa Mendes), Petisco RJ
      (Bruno Carvalho). NAME TRAP: Maria Santos (CS) ≠ Maria Silva (Sales).
    note: Tests entity resolution + alias handling + the two-Marias trap, each cited.
