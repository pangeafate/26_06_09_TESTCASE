# HelixPay golden ground truth — authored BY EYE from the raw data/ files.
#
# This file is the honest oracle for the build (HELIXPAY_BUILD_SPEC.md §8). Every
# fact below was read out of a raw source file by a human-independent grader who
# wrote NONE of the extraction or query code. The extraction check (eval/run.py)
# asserts each of these exists as a claim/link in the Repository with the right
# source_uri + as_of, and reports recall/precision (with Wilson intervals + macro
# per-predicate recall) over the set.
#
# SP_013 grew the set from 15 → ≥30 bar facts (research/evaluation-and-ground-truth
# -best-practices.md P0 #1: "a dozen facts cannot support a recall bar"). The growth
# adds ≥2 bar facts per source format and the two name-collision + predicate-synonym
# probes the matcher now asserts (entity_collisions / predicate_synonyms below).
#
# Schema of each fact:
#   id          unique slug
#   format      md | pdf | html | slack | email | code | interview | image
#   kind        claim | link
#   subject     the entity the fact is about (free text; resolved via Repository)
#   predicate   metric_vocab key where applicable, else a stable free predicate
#   value       the asserted value, as printed (matched normalization-tolerantly —
#               numerics via the shared helixpay.ingest.normalize.values_equal, text
#               via a documented substring fallback; see eval/run.py + eval/README.md)
#   as_of       the fact's effective date (ISO); see README for as_of matching
#   source_uri  the raw file the fact was read from (must exist under data/)
#   recall_bar  true (counts toward the recall denominator) | false (informational)
#   For kind: link  → also from / to (canonical names) + link_type
#   collision_group (optional) name-collision tag; see entity_collisions: below
#   note        why this fact matters / where exactly it was read
#
# COVERAGE: >=1 bar fact per source format (all formats incl. image). Image facts: the
# caption fact is informational (recall_bar:false); structured chart datapoints are now
# graded (recall_bar:true) — see SP_021, which lifted the SPEC §11 caption-only scope cut.
# LEAKAGE (DEV_RULES §12): these values must never appear in any prompts/ few-shot.

