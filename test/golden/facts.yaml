  - id: image-sea-revenue-q1-2026
    format: image
    kind: claim
    subject: HelixPay SEA
    predicate: revenue
    value: "SGD 9.4M"
    as_of: 2026-03-31
    source_uri: data/images/revenue-trend-q1-2026.jpeg
    recall_bar: true
    note: >-
      revenue-trend-q1-2026.jpeg "SEA actual" solid line, latest point Q1'26 ≈ 9.3–9.4
      (SGD millions). FIDELITY PROBE — corroborated by all-hands "Q1 closed at SGD 14.2M"
      total minus Brasil 4.8M ⇒ ~9.4 SEA. A sub-gridline read; its verdict is the honest
      fidelity signal (a 9.3/9.40 read MISSES under normalize_value — not re-rigged).
      HelixPay SEA is minted at ingest (not seeded), distinct from HelixPay/HelixPay Brasil.

# Predicate-synonym golden pairs (research P1 #7). Each alias MUST canonicalize to the
# same key as `canonical`, or contradiction detection silently no-ops on a real conflict
# (CLAUDE.md ontology rules). test_golden.py asserts this against the seeded metric_vocab
# (helixpay.seed.metric_vocab.canonical_key — the in-memory source of truth seeded into
# the metric_vocab table). The ARR pair is the headline case from the research report.
predicate_synonyms:
  - id: arr-synonym
    canonical: arr
    aliases: ["ARR", "annual recurring revenue", "recurring revenue", "annualized recurring revenue"]
    note: >-
      THE headline synonym probe (research §F): "ARR" ≡ "annual recurring revenue" must
      land on one key. If they don't, a planted ARR conflict is never detected.
  - id: revenue-synonym
    canonical: revenue
    aliases: ["revenue", "Total Revenue", "Q1 revenue", "topline"]
    note: revenue framings printed across the dashboards / overview must collapse to one key.
  - id: nps-synonym
    canonical: nps
    aliases: ["NPS", "Net Promoter Score", "aggregate NPS"]
    note: the aggregate-NPS framings must collapse so the 47-vs-62 framing case is comparable.
  - id: ga-synonym
    canonical: ga_target
    aliases: ["GA", "general availability", "launch", "go-live", "launch date"]
    note: >-
      the Confluence GA synonyms must collapse, or the public-June vs internal-Q3
      contradiction (the primary planted one) never pairs.

# Name-collision probes (research §F + CLAUDE.md entity rules). Each name in `names`,
# resolved with its `context`, MUST resolve to a DISTINCT, non-null entity_id — that is
# how the two Marias / two Tans stay separate. eval/run.py asserts distinctness; the
# golden facts tagged `collision_group` above are the per-side claims.
entity_collisions:
  - id: two-marias
    names: ["Maria Santos", "Maria Silva"]
    contexts:
      - {source_uri: data/interviews/customer_success/Maria_Santos.md}
      - {source_uri: data/org-chart.md}
    note: >-
      Maria Santos (Head of CS, Brasil) vs Maria Silva (Head of Sales, Brasil) — same
      office, confused weekly. Must resolve to distinct entities (collision_group: maria).
  - id: two-tans
    names: ["Daniel Tan", "Tan Wei Ming"]
    contexts:
      - {source_uri: data/org-chart.md}
      - {source_uri: data/code/contributors-analysis-q1-2026.md}
    note: >-
      Daniel Tan (VP Engineering) vs Tan Wei Ming (Backend Eng, relocated SG→SP 2026-02).
      Not related; both appear in the contributors table (collision_group: tan).

# Real planted contradictions — coexisting claims that must be surfaced, never
# silently resolved (CLAUDE.md ontology rules). Each references fact ids above.
contradictions:
  - id: confluence-ga-timeline
    kind: temporal            # also source_disagreement: public vs internal
    subject: Project Confluence
    predicate: ga_target
    claim_a: md-allhands-confluence-june     # 2026-04-15, "end of June 2026" (public)
    claim_b: pdf-boarddeck-confluence-q3     # 2026-05-12, "end of Q3 2026" (internal/board)
    corroborating_sources:
      - data/weekly-review-2026-04-21.md     # "slipping ... end of Q3 (September), not end of Q2 (June)"
      - data/board-update-2026-04-22.md      # "re-baselining ... from end-of-Q2 to end-of-Q3"
      - data/interviews/leadership/Daniel_Tan.md  # "realistic ga is late august to mid september ... september thirty"
    expected: surfaced
    note: >-
      THE primary planted contradiction. Public all-hands stance (June/end-Q2) vs the
      internal/board reality (end-Q3/~Sep 30). Four independent dated sources support
      Q3; the board deck explicitly flags that the all-hands stance was unchanged. A
      correct answer surfaces BOTH, attributes each side, and prefers the freshest
      (Q3) while noting the change. This is temporal + source_disagreement.

  - id: nps-framing
    kind: source_disagreement
    subject: HelixPay
    predicate: nps
    claim_a: html-dashboard-nps               # aggregate 47 (the honest figure)
    claim_b: null                             # the "62" headline framing (all-hands)
    corroborating_sources:
      - data/all-hands-2026-04-15.md          # 62 (SEA-enterprise) used as the headline
      - data/board-update-2026-04-22.md       # "the aggregate (47) is the more honest framing"
      - data/weekly-review-2026-04-21.md      # "Marco wants us to lead with the aggregate"
    expected: surfaced_or_explained
    note: >-
      Secondary, softer contradiction: the all-hands led with NPS 62 (SEA-enterprise
      segment) while the aggregate is 47. Not a value conflict on the same predicate —
      a framing/segment disagreement. A correct answer distinguishes aggregate (47)
      from the SEA-enterprise segment (62) with sources, rather than reporting one as
      "the" NPS. Used by the nps-framing question; not part of the recall denominator.

